<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2023-2026 全球产业周期诊断与投资策略框架</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Chosen Palette: Warm Neutrals & Professional Accents -->
    <!-- Background: Stone-50 (Warm/Paper feel) -->
    <!-- Primary Text: Slate-800 -->
    <!-- Accents: 
         - US/Tech: Blue-600 
         - China/Manufacturing: Red-700
         - Commodities: Emerald-600
         - Warning/Risk: Amber-500
    -->

    <style>
        /* Chart Container Styling - Mandatory per requirements */
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px; /* Constrain max width for readability */
            margin-left: auto;
            margin-right: auto;
            height: 350px; /* Base height */
            max-height: 400px;
        }

        @media (max-width: 768px) {
            .chart-container {
                height: 300px;
            }
        }

        /* Custom Scrollbar for cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f5f5f4; 
        }
        ::-webkit-scrollbar-thumb {
            background: #d6d3d1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a29e; 
        }

        .tab-active {
            border-bottom: 3px solid #b91c1c; /* Red-700 */
            color: #b91c1c;
            font-weight: 600;
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-stone-50 text-slate-800 font-sans leading-relaxed">

    <!-- Application Structure Plan:
         The app is designed as a "Strategic Dashboard" for an investor.
         1. Header: Establishes the persona (Strategist) and the "Macro Mismatch" context.
         2. Navigation: Tabs correspond to the 4 modules of the report + a Summary/Action plan.
         3. Dynamic Content Area:
            - Macro View: Split screen comparing Commodities (Bubble chart) and Equity Structures (Doughnut).
            - Inventory Cycle: A "Scatter Plot" acting as a clock/cycle map. Users click points to see specific industry diagnoses.
            - Supply Chain: A flow/comparison view toggling between "Losers" (textiles) and "Winners" (capital expansion).
            - Titans (US vs China): Comparative cards for AI, EV, and Old Economy.
            - Action Plan: Filterable investment takeaways.
         4. Why this structure? It moves from the abstract (Macro) to the specific (Inventory/Supply Chain) to the strategic (Titans) and finally the actionable (Investment).
    -->

    <!-- Header -->
    <header class="bg-white border-b border-stone-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">全球产业周期诊断 <span class="text-stone-500 font-light">2023-2026</span></h1>
                <p class="text-sm text-stone-500 mt-1">华尔街产业经济学家视角 | 逆全球化 · 周期错位 · 资产重估</p>
            </div>
            <div class="mt-4 md:mt-0 bg-stone-100 px-4 py-2 rounded-lg text-xs md:text-sm text-stone-600 border border-stone-200">
                <span class="font-bold text-red-700">当前背景：</span> 中美宏观周期错位 + 供应链重构 (China+1)
            </div>
        </div>
        
        <!-- Navigation -->
        <nav class="max-w-6xl mx-auto px-4 mt-2 overflow-x-auto">
            <div class="flex space-x-6 md:space-x-8 min-w-max border-b border-stone-200" id="nav-container">
                <!-- Nav items injected via JS -->
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8 min-h-[80vh]" id="main-content">
        <!-- Content injected via JS -->
    </main>

    <!-- Footer -->
    <footer class="bg-stone-100 border-t border-stone-200 py-8 mt-12">
        <div class="max-w-6xl mx-auto px-4 text-center text-stone-500 text-sm">
            <p>本报告基于模拟的华尔街策略师观点，仅供扫盲与框架参考，不构成直接投资建议。</p>
            <p class="mt-2">© 2023-2026 周期诊断模拟系统</p>
        </div>
    </footer>

    <!-- Visualization & Content Choices:
         1. Macro: Chart.js Bubble (Commodities: Price vs. Term Structure) - visualizes "Levels" and "Tightness". Chart.js Doughnut (Market Cap) - visualizes "Structure".
         2. Inventory: Chart.js Scatter (YoY Revenue vs. YoY Inventory) - visualizes the cycle phase (Boom, Bust, Recovery). Interaction: Click point -> Show details.
         3. Supply Chain: HTML Grid + JS State Toggles. Simple progress bars for "Substitution Rate".
         4. Titans: Comparative HTML Cards.
         CONFIRMATION: NO SVG graphics used. NO Mermaid JS used.
    -->

            titans: {

                cards: [

                    { category: "宏观", action: "关注", target: "铜矿ETF (COPX)", reason: "若2025衰退导致大跌，是建仓良机（物理缺口）。" },

        let currentTab = 'macro';

        // --- Core Rendering Functions ---

        function init() {
            renderNav();
            renderContent(currentTab);
        }

        function renderNav() {
            const tabs = [
                { id: 'macro', label: '1. 宏观全景' },
                { id: 'inventory', label: '2. 库存周期' },
                { id: 'supplyChain', label: '3. 供应链重构' },
                { id: 'titans', label: '4. 产业对决' },
                { id: 'strategy', label: '★ 投资启示' }
            ];
            
            const navContainer = document.getElementById('nav-container');
            navContainer.innerHTML = tabs.map(tab => `
                <button 
                    onclick="switchTab('${tab.id}')"
                    class="pb-3 text-sm md:text-base font-medium whitespace-nowrap transition-colors duration-200 ${currentTab === tab.id ? 'tab-active' : 'text-stone-500 hover:text-stone-800'}"
                >
                    ${tab.label}
                </button>
            `).join('');
        }

        function switchTab(tabId) {
            currentTab = tabId;
            renderNav();
            renderContent(tabId);
        }

        function renderContent(tabId) {
            const container = document.getElementById('main-content');
            
            // Shared Header for each section
            let sectionData = reportData[tabId];
            let contentHTML = `
                <div class="mb-8 animate-fade-in">
                    <h2 class="text-2xl font-bold text-slate-800 mb-2">${sectionData.title}</h2>

                </div>
            `;

                contentHTML += `
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <!-- Commodities Chart -->
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-200">

                            </h3>

                                <canvas id="commoditiesChart"></canvas>
                            </div>
                            <div class="mt-4 text-sm text-stone-500">

                                <span class="inline-block w-3 h-3 rounded-full bg-stone-400 mr-1 ml-3"></span> 中国定价 (锂/镍)
                                <p class="mt-2 text-xs">* 气泡大小代表战略重要性。X轴：价格水位，Y轴：期限结构 (越高越紧缺)</p>
                            </div>
                        </div>

                        <!-- Stock Market Structure -->
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-200">
                            <h3 class="text-lg font-bold mb-4 text-slate-800 flex items-center">
                                <span class="mr-2 text-xl">⚖️</span> 股市肌肉结构对比
                            </h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div class="text-center">
                                    <div class="chart-container" style="height:200px;">
                                        <canvas id="usStockChart"></canvas>
                                    </div>
                                    <p class="mt-2 font-bold text-blue-700">美国：科技+消费</p>
                                </div>
                                <div class="text-center">
                                    <div class="chart-container" style="height:200px;">
                                        <canvas id="cnStockChart"></canvas>
                                    </div>
                                    <p class="mt-2 font-bold text-red-700">中国：制造+金融</p>
                                </div>
                            </div>
                            <div class="mt-4 bg-blue-50 p-3 rounded-lg text-sm text-slate-700">
                                <strong>核心洞察：</strong> ${sectionData.insight}
                            </div>
                        </div>
                    </div>
                `;
            } else if (tabId === 'inventory') {
                contentHTML += `

                            <span class="text-xs bg-stone-100 text-stone-500 px-2 py-1 rounded">点击气泡查看诊断</span>

                            <canvas id="inventoryChart"></canvas>

                            <strong class="text-blue-800 block mb-1">↘ 被动去库存 (复苏前夜)</strong>
                            <p>营收↑ 库存↓。需求回暖，库存见底。如：消费电子、存储。</p>
                        </div>
                        <div class="p-4 bg-red-50 border border-red-100 rounded-lg">

                            <p class="text-sm text-stone-600 mb-4">${sectionData.losers.impact}</p>

                `;
            } else if (tabId === 'titans') {
                contentHTML += `
                    <div class="space-y-6">
                        ${sectionData.cards.map(card => `
                            <div class="bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden card-hover">
                                <div class="bg-stone-50 px-6 py-4 border-b border-stone-200 flex items-center justify-between">
                                    <h3 class="font-bold text-lg text-slate-800">${card.title}</h3>
                                    <span class="text-xs font-mono text-stone-400">VS</span>
                                </div>
                                <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6 relative">
                                    <!-- Divider -->
                                    <div class="hidden md:block absolute left-1/2 top-6 bottom-6 w-px bg-stone-200"></div>
                                    
                                    <!-- US Side -->
                                    <div class="text-center md:text-left pr-0 md:pr-4">
                                        <div class="text-xs font-bold text-blue-600 uppercase tracking-wider mb-1">United States</div>
                                        <h4 class="font-bold text-slate-800 mb-2">${card.us}</h4>
                                    </div>
                                    
                                    <!-- CN Side -->
                                    <div class="text-center md:text-right pl-0 md:pl-4">
                                        <div class="text-xs font-bold text-red-600 uppercase tracking-wider mb-1">China</div>
                                        <h4 class="font-bold text-slate-800 mb-2">${card.cn}</h4>
                                    </div>
                                </div>
                                <div class="px-6 pb-6 pt-2">
                                    <div class="bg-stone-50 p-4 rounded-lg text-sm border border-stone-100">
                                        <p class="mb-2 text-slate-700"><strong>分析：</strong>${card.analysis}</p>
                                        <p class="text-stone-900 font-bold">👉 结论：${card.verdict}</p>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (tabId === 'strategy') {
                contentHTML += `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-200 overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm whitespace-nowrap md:whitespace-normal">
                                <thead class="bg-stone-100 text-stone-600">
                                    <tr>
                                        <th class="p-4">领域</th>
                                        <th class="p-4">动作</th>
                                        <th class="p-4">标的 / 方向</th>
                                        <th class="p-4">核心逻辑</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-stone-100">
                                    ${sectionData.tips.map(tip => `
                                        <tr class="hover:bg-stone-50 transition-colors">
                                            <td class="p-4 font-medium text-stone-500">${tip.category}</td>
                                            <td class="p-4">
                                                <span class="px-2 py-1 rounded text-xs font-bold ${tip.action === '关注' || tip.action === '配置' ? 'bg-green-100 text-green-700' : (tip.action === '埋伏' ? 'bg-blue-100 text-blue-700' : 'bg-red-100 text-red-700')}">
                                                    ${tip.action}
                                                </span>
                                            </td>
                                            <td class="p-4 font-bold text-slate-800">${tip.target}</td>
                                            <td class="p-4 text-stone-600">${tip.reason}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="mt-8 p-6 bg-stone-800 text-stone-100 rounded-xl text-center">
                        <h3 class="text-xl font-bold mb-2">最终诊断</h3>
                        <p class="opacity-90 max-w-2xl mx-auto">
                            2023-2026年，最大的机会不在于博弈AI的终极梦想，而在于捕捉中美周期错位带来的<span class="text-yellow-400 font-bold">实物资产定价权</span>，以及中国制造业在逆全球化中被迫进化出的<span class="text-yellow-400 font-bold">全球竞争力</span>。
                        </p>
                    </div>
                `;
            }

            container.innerHTML = contentHTML;

            // Trigger Chart Rendering after DOM injection
            if (tabId === 'macro') {
                renderCommoditiesChart();
                renderStockCharts();
            } else if (tabId === 'inventory') {
                renderInventoryChart();
            }
        }

        // --- Chart Rendering Functions ---

        function renderCommoditiesChart() {
            const ctx = document.getElementById('commoditiesChart').getContext('2d');
            
            // Transform data for Bubble Chart: x=Price, y=TermStructure, r=Radius
            const data = reportData.macro.commodities.map(c => ({
                x: c.priceLevel,
                y: c.termStructure,
                r: c.r,
                label: c.label,
                desc: c.desc,
                type: c.type
            }));

            new Chart(ctx, {
                type: 'bubble',
                data: {
                    datasets: [{
                        label: '大宗商品',
                        data: data,
                        backgroundColor: (context) => {
                            const val = context.raw?.type;
                            return val === 'global' ? 'rgba(5, 150, 105, 0.6)' : 'rgba(220, 38, 38, 0.6)'; // Green for Global, Red for China
                        },
                        borderColor: (context) => {
                            const val = context.raw?.type;
                            return val === 'global' ? 'rgba(5, 150, 105, 1)' : 'rgba(220, 38, 38, 1)';
                        }
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            title: { display: true, text: '当前价格水位 (低 -> 高)' },
                            min: 0, max: 100,
                            grid: { display: false }
                        },
                        y: {
                            title: { display: true, text: '期限结构紧张度 (供需缺口)' },
                            min: 0, max: 100,
                            grid: { color: '#e7e5e4' }
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.raw.label + ': ' + context.raw.desc;
                                }
                            }
                        },
                        legend: { display: false }
                    }
                }
            });
        }

        function renderStockCharts() {
            // US Stock Chart
            new Chart(document.getElementById('usStockChart').getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: reportData.macro.stocksUS.map(d => d.label),
                    datasets: [{
                        data: reportData.macro.stocksUS.map(d => d.value),
                        backgroundColor: reportData.macro.stocksUS.map(d => d.color),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } }
                }
            });

            // China Stock Chart
            new Chart(document.getElementById('cnStockChart').getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: reportData.macro.stocksCN.map(d => d.label),
                    datasets: [{
                        data: reportData.macro.stocksCN.map(d => d.value),
                        backgroundColor: reportData.macro.stocksCN.map(d => d.color),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } }
                }
            });
        }

        function renderInventoryChart() {
            const ctx = document.getElementById('inventoryChart').getContext('2d');
            const inventoryChart = new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: '行业位置',
                        data: reportData.inventory.points.map(p => ({ x: p.x, y: p.y, raw: p })),
                        backgroundColor: (ctx) => {
                            const x = ctx.raw?.x;
                            const y = ctx.raw?.y;
                            if (x > 0 && y > 0) return 'rgba(22, 163, 74, 0.7)'; // Boom (Green)
                            if (x < 0 && y > 0) return 'rgba(37, 99, 235, 0.7)'; // Recovery (Blue)
                            if (y < 0) return 'rgba(220, 38, 38, 0.7)'; // Bust (Red)
                            return 'rgba(156, 163, 175, 0.7)';
                        },
                        pointRadius: 8,
                        pointHoverRadius: 12
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    onClick: (e, elements) => {
                        if (elements.length > 0) {
                            const index = elements[0].index;
                            const dataPoint = reportData.inventory.points[index];
                            showInventoryDetail(dataPoint);
                        }
                    },
                    scales: {
                        x: {
                            title: { display: true, text: '库存增速 (YoY)' },
                            grid: { color: (ctx) => ctx.tick.value === 0 ? '#444' : '#e5e7eb', lineWidth: (ctx) => ctx.tick.value === 0 ? 2 : 1 },
                            suggestedMin: -20, suggestedMax: 50
                        },
                        y: {
                            title: { display: true, text: '营收增速 (YoY)' },
                            grid: { color: (ctx) => ctx.tick.value === 0 ? '#444' : '#e5e7eb', lineWidth: (ctx) => ctx.tick.value === 0 ? 2 : 1 },
                            suggestedMin: -30, suggestedMax: 50
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.raw.raw.label;
                                }
                            }
                        },
                        annotation: {
                            // Can add labels for quadrants here if plugin enabled, using standard grid lines for now
                        }
                    }
                }
            });
        }

        function showInventoryDetail(data) {
            const detailBox = document.getElementById('inventory-detail');
            detailBox.classList.remove('hidden');
            detailBox.innerHTML = `
                <h4 class="font-bold text-lg text-slate-800">${data.label}</h4>
                <div class="flex items-center gap-2 mt-1 mb-2">
                    <span class="px-2 py-0.5 rounded text-xs bg-stone-200 text-stone-700 font-bold">${data.phase}</span>
                    <span class="text-sm font-semibold ${data.strategy === '进攻' ? 'text-green-600' : (data.strategy === '规避' ? 'text-red-600' : 'text-blue-600')}">建议：${data.strategy}</span>
                </div>
                <p class="text-stone-600 text-sm">${data.desc}</p>
            `;
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
